# Task File Map — Phase 6 Governance
version: "1.0.0"
path_semantics:
  directory_zone: A real, exclusive folder path. The exact leaf source file is chosen only in a Phase 6.5 packet after technology is confirmed; it must remain inside this zone.
  full_file: A concrete governance file. Builders may edit only the declared task region after initialization.
operation_rules:
  CREATE: May create the declared file or content within an empty directory zone.
  UPDATE: May update only the declared region after reviewer-visible diff.
  FULL_FILE: Allowed only for a newly created file or explicit Human Lead exception.
zone_groups:
  foundation: [apps/api/foundation/, apps/api/logging/, apps/mock-his/]
  ai: [apps/api/ai/, apps/api/capabilities/emergency/]
  experience: [apps/chat-web/, apps/admin-web/]
  quality: [tests/]
  delivery: [docs/, scripts/, config/]
