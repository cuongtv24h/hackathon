# Task-to-File Contract Map — Phase 6
version: "1.0.0"
source_work_package_map: docs/spec-registry/work-package-map.yaml
rules:
  - A directory_zone is a real exclusive folder, not a framework/language choice.
  - A builder may create leaf files only within its declared directory_zone.
  - A work-package owner may create only its exact pytest companion path under tests/unit/, tests/integration/ or tests/contract/; QA reviews that test.
  - UPDATE requires the exact TASK marker; FULL_FILE is only for a new file or approved exception.
  - Cross-zone edits require a Human Lead exception recorded on the board.
work_packages:
  - id: WP-001
    owner_pool: OTHER
    suggested_branch: task/WP-001
    files:
      - path: docs/repo-manifest.yaml
        path_kind: file
        operation: UPDATE
        region: {TASK:WP-001}
      - path: docs/file-ownership.yaml
        path_kind: file
        operation: UPDATE
        region: {TASK:WP-001}
      - path: docs/task-file-map.yaml
        path_kind: file
        operation: UPDATE
        region: {TASK:WP-001}
      - path: docs/spec-registry/task-to-file-contract-map.yaml
        path_kind: file
        operation: UPDATE
        region: {TASK:WP-001}
