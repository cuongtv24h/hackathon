# Scaffold Script Contracts — Phase 6
version: "1.0.0"
scripts:
  - path: scripts/bootstrap.bat
    owner_work_package: WP-002
    purpose: Create approved empty directory zones without overwriting files.
    input: Run from repository root; no required arguments.
    success_conditions:
      - Required workspace and PromptOps directories exist.
      - Existing files are untouched.
      - Exit code is 0.
    failure_conditions:
      - Not executed from repository root.
      - Required governance manifest is missing.
required_files:
  - docs/repo-manifest.yaml
  - docs/file-ownership.yaml
  - docs/task-file-map.yaml
  - docs/region-marker-policy.md
  - docs/spec-registry/scaffold-script-contracts.yaml
  - docs/spec-registry/task-to-file-contract-map.yaml
  - scripts/bootstrap.bat
  - .env.example
  - README.md
